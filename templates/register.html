{% extends "base.html" %}
{% block title %}Register — The Reading Room{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="form-card">
    <div class="eyebrow">Become a contributor</div>
    <h1>Register</h1>
    <p class="sub">An account lets you submit papers for review and track their status.</p>

    <form method="post">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" required autofocus>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6">
      </div>
      <div class="field">
        <label for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center;">Create account</button>
    </form>

    <div class="form-foot">
      Already registered? <a href="{{ url_for('login') }}">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
