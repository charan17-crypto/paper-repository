{% extends "base.html" %}
{% block title %}Log in — The Reading Room{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="form-card">
    <div class="eyebrow">Welcome back</div>
    <h1>Log in</h1>
    <p class="sub">Reach your dashboard, submit papers, or review approvals.</p>

    <form method="post">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center;">Log in</button>
    </form>

    <div class="form-foot">
      New here? <a href="{{ url_for('register') }}">Create an account</a>
    </div>
  </div>
</div>
{% endblock %}
